            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            display: flex;
            gap: 8px;
            align-items: baseline;

            border-radius: 40px;

            border-radius: 40px;
            font-size: 0.7rem;

            font-size: 0.8rem;

            width: 0.9rem;
            height: 0.9rem;
            cursor: pointer;
        }

            font-size: 0.75rem;
            margin-top: 8px;
            font-weight: 500;
            padding: 4px 0;
        }

            border-radius: 32px;
            padding: 1.5rem 2rem;
            margin-top: 1rem;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);

            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `card-${idx}`;
            const titleDiv = document.createElement('div');
            titleDiv.className = 'q-title';
            titleDiv.innerHTML = `<span class="q-num">Q${q.id}</span><span class="q-domain">${q.domain}</span>`;
            const qTextDiv = document.createElement('div');
            qTextDiv.className = 'q-text';
            qTextDiv.innerText = q.text;
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const letters = ['A','B','C','D'];
            q.options.forEach((opt, optIdx) => {
                if (optIdx >= letters.length) return;
                const letter = letters[optIdx];
                const radioId = `q_${idx}_${letter}`;
                const label = document.createElement('label');
                label.className = 'option-label';
                label.htmlFor = radioId;
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q_${idx}`;
                radio.value = letter;
                radio.id = radioId;
                radio.addEventListener('change', () => updateAnsweredCount());
                label.appendChild(radio);
                let optText = opt.length > 100 ? opt.substring(0, 100) + '…' : opt;
                label.appendChild(document.createTextNode(` ${letter}. ${optText}`));
                optionsDiv.appendChild(label);
            });
            card.appendChild(titleDiv);
            card.appendChild(qTextDiv);
            card.appendChild(optionsDiv);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback-icon';
            feedbackDiv.id = `fb-${idx}`;
            card.appendChild(feedbackDiv);
            container.appendChild(card);
        });
        updateAnsweredCount();
    }

    function updateAnsweredCount() {
        let answered = 0;
        for (let i = 0; i < TOTAL; i++) {
            const radios = document.getElementsByName(`q_${i}`);
            if (Array.from(radios).some(r => r.checked)) answered++;
        }
        document.getElementById('answeredCounter').innerText = `📌 Answered: ${answered} / ${TOTAL}`;
    }

    function computeAndShowResult() {
        let score = 0;
        const userSelections = new Array(TOTAL).fill(null);
        for (let i = 0; i < TOTAL; i++) {
            const radios = document.getElementsByName(`q_${i}`);
            let selected = null;
            for (let r of radios) if (r.checked) { selected = r.value; break; }
            userSelections[i] = selected;
            if (selected === questionsData[i].answer) score++;
        }
        const percent = Math.round((score / TOTAL) * 100);
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('finalScoreText').innerHTML = `🎯 Your Score: ${score} / ${TOTAL} (${percent}%)`;
        let mistakeHtml = `<strong>📖 Detailed review (incorrect or unanswered):</strong><br>`;
        let mistakeCount = 0;
        for (let i = 0; i < TOTAL; i++) {
            const selected = userSelections[i];
            const correctAns = questionsData[i].answer;
            if (selected !== correctAns) {
                mistakeCount++;
                const q = questionsData[i];
                const shortText = q.text.length > 80 ? q.text.substring(0,80)+"…" : q.text;
                const correctIndex = "ABCD".indexOf(correctAns);
                const correctFull = correctIndex !== -1 && q.options[correctIndex] ? q.options[correctIndex].substring(0, 100) : "";
                mistakeHtml += `<div class="mistake-item">❌ <strong>Q${q.id}</strong> (${q.domain}): ${shortText}<br> &nbsp;&nbsp;✔ Correct: ${correctAns}. ${correctFull}<br> &nbsp;&nbsp;Your answer: ${selected ? selected : '(none)'}</div>`;
            }
        }
        if (mistakeCount === 0) mistakeHtml = `<span>🏆 Perfect! No mistakes. Excellent preparation.</span>`;
        document.getElementById('mistakeList').innerHTML = mistakeHtml;

        for (let i = 0; i < TOTAL; i++) {
            const card = document.getElementById(`card-${i}`);
            const selected = userSelections[i];
            const correct = questionsData[i].answer;
            const isCorrect = (selected === correct);
            card.classList.remove('correct-highlight', 'incorrect-highlight');
            if (selected && isCorrect) card.classList.add('correct-highlight');
            else card.classList.add('incorrect-highlight');
            const fbDiv = document.getElementById(`fb-${i}`);
            if (fbDiv) {
                if (selected && isCorrect) fbDiv.innerHTML = '<span class="correct-badge">✅ Correct</span>';
                else if (selected && !isCorrect) fbDiv.innerHTML = `<span class="wrong-badge">❌ Wrong (correct: ${correct})</span>`;
                else fbDiv.innerHTML = `<span class="wrong-badge">⚠️ Unanswered (correct: ${correct})</span>`;
            }
        }
        document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
    }

    function resetAll() {
        for (let i = 0; i < TOTAL; i++) {
            const radios = document.getElementsByName(`q_${i}`);
            radios.forEach(r => r.checked = false);
            const card = document.getElementById(`card-${i}`);
            if (card) card.classList.remove('correct-highlight', 'incorrect-highlight');
            const fbDiv = document.getElementById(`fb-${i}`);
            if (fbDiv) fbDiv.innerHTML = '';
        }
        updateAnsweredCount();
        document.getElementById('resultPanel').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderQuestions();
        document.getElementById('submitBtn').addEventListener('click', computeAndShowResult);
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('scrollTopBtn').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    });
</script>
</body>
</html>
